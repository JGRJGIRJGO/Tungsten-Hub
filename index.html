<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tungsten Hub — Key System Gate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0d0d0f;
            --container-bg: rgba(20, 20, 24, 0.7);
            --stroke-color: rgba(255, 255, 255, 0.08);
            --accent-1: #0096ff;
            --accent-2: #00ccff;
            --text-main: #f5f5fa;
            --text-dark: #a0a0a5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 150, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 204, 255, 0.08) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .glass-panel {
            background: var(--container-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--stroke-color);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            transform: scale(0.9);
            opacity: 0;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-1));
            border-radius: 12px 12px 0 0;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 30%, var(--text-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--accent-2);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
        }

        .status-area {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid var(--accent-1);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 15px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .key-display-box {
            display: none;
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1px dashed var(--stroke-color);
            border-radius: 6px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.5px;
            margin: 20px 0;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .key-display-box:hover {
            border-color: var(--accent-1);
            background: rgba(0, 150, 255, 0.03);
        }

        .action-btn {
            display: none;
            width: 100%;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 15px rgba(0, 150, 255, 0.3);
        }

        .action-btn:hover {
            opacity: 0.9;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .error-message {
            display: none;
            color: #ff4b4b;
            font-size: 13px;
            margin: 20px 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="header">
            <h1>Tungsten Hub</h1>
            <p>Key System Gate</p>
        </div>

        <div class="status-area" id="status-area">
            <div class="spinner" id="spinner"></div>
            <p class="status-text" id="status-text">Bypassing local handshakes...</p>
        </div>

        <div class="error-message" id="error-box">
            No Hardware ID (HWID) detected. Please run the script in Roblox to generate your key URL.
        </div>

        <div class="key-display-box" id="key-box">
            Tungsten_GENERATING...
        </div>

        <button class="action-btn" id="action-btn">Copy Secure Key</button>
    </div>

    <script>
        function multiply32(a, b) {
            const a_hi = (a >>> 16) & 0xFFFF;
            const a_lo = a & 0xFFFF;
            const b_hi = (b >>> 16) & 0xFFFF;
            const b_lo = b & 0xFFFF;
            const mid = (a_hi * b_lo + a_lo * b_hi) & 0xFFFF;
            return ((mid * 65536) + a_lo * b_lo) >>> 0;
        }

        function generateDailyHWIDKey(hwid) {
            const cleanHwid = hwid.replace(/\s+/g, '').replace(/[\x00-\x1F\x7F-\x9F]/g, '');
            const date = new Date();
            const day = String(date.getUTCDate()).padStart(2, '0');
            const month = String(date.getUTCMonth() + 1).padStart(2, '0');
            const year = date.getUTCFullYear();
            const dateStr = `${day}${month}${year}`;
            const salt = "TungstenSecureKeySystem_V3_Reset_8F2D";
            const input = `${cleanHwid}_${salt}_${dateStr}`;
            
            let hash = 2166136261;
            for (let i = 0; i < input.length; i++) {
                hash ^= input.charCodeAt(i);
                hash = multiply32(hash, 16777619);
            }
            return "Tungsten_" + hash.toString(16).toUpperCase();
        }

        const urlParams = new URLSearchParams(window.location.search);
        const hwidParam = urlParams.get('hwid');
        const stepsParam = urlParams.get('steps');

        const spinner = document.getElementById('spinner');
        const statusText = document.getElementById('status-text');
        const errorBox = document.getElementById('error-box');
        const keyBox = document.getElementById('key-box');
        const actionBtn = document.getElementById('action-btn');

        // Parse Database configuration parameters
        const dbUrl = urlParams.get('db_url') || localStorage.getItem('tungsten_db_url');
        const dbKey = urlParams.get('db_key') || localStorage.getItem('tungsten_db_key');
        const scriptId = urlParams.get('script_id') || localStorage.getItem('tungsten_script_id');

        let supabaseClient = null;
        if (dbUrl && dbKey) {
            try {
                supabaseClient = supabase.createClient(decodeURIComponent(dbUrl), decodeURIComponent(dbKey));
            } catch(e) {
                console.error("Supabase client connection failed:", e);
            }
        }

        async function logCheckin(stepNum) {
            if (!supabaseClient || !scriptId) return;
            const hwid = hwidParam || localStorage.getItem('tungsten_hwid');
            if (!hwid) return;
            try {
                await supabaseClient
                    .from('key_redeems')
                    .insert([{ script_id: scriptId, hwid: hwid, step: stepNum }]);
            } catch(e) {
                console.error("Analytics report failed:", e);
            }
        }

        if (hwidParam && hwidParam.trim() !== "") {
            // Step 1: User came fresh from Roblox. Save HWID, total steps, and checkpoint links.
            const totalSteps = parseInt(stepsParam) || 1;
            localStorage.setItem('tungsten_hwid', hwidParam.trim());
            localStorage.setItem('tungsten_total_steps', totalSteps);
            localStorage.setItem('tungsten_current_step', '0');
            
            // Save database parameters if present
            if (urlParams.get('db_url')) localStorage.setItem('tungsten_db_url', urlParams.get('db_url'));
            if (urlParams.get('db_key')) localStorage.setItem('tungsten_db_key', urlParams.get('db_key'));
            if (urlParams.get('script_id')) localStorage.setItem('tungsten_script_id', urlParams.get('script_id'));

            // Save link parameters
            for (let i = 1; i <= totalSteps; i++) {
                const linkVal = urlParams.get(`link${i}`);
                if (linkVal) {
                    localStorage.setItem(`tungsten_link_${i}`, decodeURIComponent(linkVal));
                } else if (i === 1) {
                    localStorage.setItem('tungsten_link_1', 'https://lootdest.org/s?DfJNgxIO');
                }
            }

            statusText.innerText = `Redirecting to Checkpoint 1 of ${totalSteps}...`;
            
            // Log Checkpoint 1 Start
            logCheckin(1);

            setTimeout(() => {
                const targetLink = localStorage.getItem('tungsten_link_1');
                window.location.href = targetLink;
            }, 800);
            
        } else {
            // Step 2: User returned from a checkpoint. Read localStorage state.
            const storedHwid = localStorage.getItem('tungsten_hwid');
            const totalSteps = parseInt(localStorage.getItem('tungsten_total_steps')) || 0;
            let currentStep = parseInt(localStorage.getItem('tungsten_current_step'));

            if (!storedHwid || storedHwid.trim() === "" || isNaN(totalSteps)) {
                spinner.style.display = 'none';
                statusText.style.display = 'none';
                errorBox.style.display = 'block';
            } else {
                // We returned from a step. Increment step counter.
                currentStep = currentStep + 1;
                localStorage.setItem('tungsten_current_step', currentStep);

                if (currentStep < totalSteps) {
                    // Log checkpoint progress
                    logCheckin(currentStep + 1);

                    statusText.innerText = `Checkpoint ${currentStep} completed! Redirecting to Checkpoint ${currentStep + 1} of ${totalSteps}...`;
                    setTimeout(() => {
                        const targetLink = localStorage.getItem(`tungsten_link_${currentStep + 1}`);
                        if (targetLink) {
                            window.location.href = targetLink;
                        } else {
                            showKey();
                        }
                    }, 1200);
                } else {
                    // Log full completion (marked as step 0)
                    logCheckin(0);
                    showKey();
                }
            }
        }

        function showKey() {
            const storedHwid = localStorage.getItem('tungsten_hwid');
            setTimeout(() => {
                statusText.innerText = "Generating HWID-locked key...";
                setTimeout(() => {
                    const generatedKey = generateDailyHWIDKey(storedHwid);
                    
                    spinner.style.display = 'none';
                    statusText.innerText = "Key generated successfully! Proceed to copy.";
                    keyBox.innerText = generatedKey;
                    keyBox.style.display = 'block';
                    actionBtn.style.display = 'block';
                    
                    // Clear step counters
                    localStorage.removeItem('tungsten_current_step');
                    localStorage.removeItem('tungsten_total_steps');
                }, 1000);
            }, 800);
        }

        function copyKey() {
            const keyText = keyBox.innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                actionBtn.innerText = "Key Copied!";
                actionBtn.style.background = "linear-gradient(135deg, #2ecc71, #27ae60)";
                setTimeout(() => {
                    actionBtn.innerText = "Copy Secure Key";
                    actionBtn.style.background = "linear-gradient(135deg, var(--accent-1), var(--accent-2))";
                }, 2000);
            }).catch(() => {
                alert("Failed to copy automatically. Please copy manually.");
            });
        }

        actionBtn.addEventListener('click', copyKey);
        keyBox.addEventListener('click', copyKey);
    </script>
</body>
</html>
